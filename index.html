<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>「今」に寄り添うJUMPの一曲</title>
  
  <style>
    :root {
      --accent: #526071;
      --accent-2: #f2a85b;
      --accent-soft: rgba(82, 96, 113, 0.12);
      --ink: #242336;
      --text: #242336;
      --muted: #747284;
      --line: rgba(120, 116, 128, 0.18);
      --glass: rgba(255,255,255,0.80);
      --glass-strong: rgba(255,255,255,0.92);
      --shadow: 0 18px 40px rgba(36, 35, 54, 0.10);
      --bg:
        radial-gradient(circle at 8% 2%, rgba(236,72,91,0.20) 0 16%, transparent 38%),
        radial-gradient(circle at 92% 10%, rgba(92,176,255,0.22) 0 18%, transparent 40%),
        radial-gradient(circle at 12% 88%, rgba(110,211,125,0.18) 0 20%, transparent 42%),
        radial-gradient(circle at 88% 88%, rgba(255,211,62,0.24) 0 18%, transparent 40%),
        linear-gradient(145deg,
          rgba(255,248,251,0.98) 0%,
          rgba(255,236,222,0.96) 20%,
          rgba(255,250,210,0.94) 38%,
          rgba(229,255,239,0.94) 56%,
          rgba(225,244,255,0.95) 76%,
          rgba(255,241,247,0.96) 100%);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      color: var(--text);
      background: var(--bg);
      font-family: "Inter", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
      transition: background 0.34s ease;
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      z-index: 0;
      filter: blur(10px);
    }

    body::before {
      top: -42px;
      left: -42px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(236,72,91,0.30), rgba(255,211,62,0.20), rgba(92,176,255,0.18));
      opacity: 0.72;
    }

    body::after {
      right: -50px;
      bottom: 30px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,211,62,0.30), rgba(110,211,125,0.22), rgba(92,176,255,0.20));
      opacity: 0.66;
    }

    body.member-theme {
      background:
        radial-gradient(circle at 0% 0%, rgba(255,255,255,0.95) 0 16%, transparent 40%),
        linear-gradient(160deg,
          color-mix(in srgb, var(--accent) 9%, #fffbfd) 0%,
          #ffffff 50%,
          color-mix(in srgb, var(--accent-2) 12%, #f9f9ff) 100%);
    }

    body.white-theme {
      background:
        radial-gradient(circle at 0% 0%, rgba(255,255,255,0.96) 0 16%, transparent 40%),
        linear-gradient(160deg, #ffffff 0%, #fafafe 48%, #eef1f7 100%);
    }

    button {
      font: inherit;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      border: none;
      outline: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(100%, 474px);
      margin: 0 auto;
      padding: 12px 14px 24px;
    }

    .hero {
      position: relative;
      display: block;
      margin: 2px 0 16px;
      padding: 16px 18px 18px;
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,0.76) 0%, rgba(255,255,255,0.54) 100%);
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: 0 16px 34px rgba(36,35,54,0.062), inset 0 0 0 1px rgba(120,116,128,0.075);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -16px;
      top: -18px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(236,72,91,0.16), rgba(255,211,62,0.14), rgba(92,176,255,0.16), rgba(110,211,125,0.12));
      opacity: .48;
      filter: blur(2px);
      pointer-events: none;
    }

    .hero-icon {
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 1;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.74);
      color: color-mix(in srgb, var(--accent) 66%, #8a8794);
      border: 1px solid rgba(255,255,255,0.84);
      box-shadow: 0 8px 16px rgba(36,35,54,0.055);
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    .hero-text {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: grid;
      gap: 8px;
      padding-right: 58px;
    }

    .eyebrow {
      color: color-mix(in srgb, var(--accent) 48%, #807b89);
      font-size: 11px;
      font-weight: 780;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: "SF Pro Display", "Avenir Next", "Segoe UI", "PingFang SC", "Noto Sans JP", sans-serif;
    }

    h1 {
      margin: 0;
      color: #202133;
      font-family: "SF Pro Display", "Avenir Next", "Helvetica Neue", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans JP", sans-serif;
      display: grid;
      gap: 1px;
    }

    h1 .title-line {
      display: block;
      white-space: nowrap;
    }

    h1 .title-line-top {
      display: flex;
      align-items: baseline;
      gap: 0;
      font-size: 28px;
      line-height: 1.06;
      letter-spacing: -0.045em;
      font-weight: 740;
    }

    h1 .title-bracket {
      font-size: 0.82em;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.02em;
      opacity: 0.96;
    }

    h1 .title-now {
      font-weight: 820;
      letter-spacing: -0.055em;
    }

    h1 .title-rest {
      margin-left: 0.2em;
      font-weight: 740;
      letter-spacing: -0.05em;
    }

    h1 .title-line-main {
      font-size: 44px;
      line-height: 0.94;
      letter-spacing: -0.075em;
      font-weight: 840;
    }

    .subtitle,
    .section-copy,
    .section-title:empty,
    .subtitle:empty,
    .section-copy:empty {
      display: none;
    }

    main {
      display: block;
    }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeUp .22s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card,
    .result-card {
      width: 100%;
      margin: 0 auto;
      padding: 18px;
      border-radius: 28px;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.76);
      box-shadow: var(--shadow), inset 0 0 0 1px var(--line);
      backdrop-filter: blur(18px);
    }

    .result-card {
      background: var(--glass-strong);
      padding: 20px;
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 17px;
      font-weight: 830;
      line-height: 1.22;
      color: var(--ink);
    }

    .section-copy {
      display: block;
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .language-grid,
    .answer-grid,
    .member-group-grid {
      display: grid;
      gap: 12px;
    }

    .language-grid { grid-template-columns: 1fr; }

    #languageScreen.card {
      padding: 16px;
      border-radius: 30px;
      display: none;
    }

    #languageScreen.active {
      display: block;
    }

    #memberScreen.card {
      padding: 18px 16px;
    }

    #languageScreen .section-title,
    #languageScreen .section-copy {
      display: none;
    }

    #languageScreen .language-grid {
      display: grid;
      gap: 10px;
    }

    .member-grid {
      display: grid;
      gap: 18px;
    }

    .member-section {
      display: grid;
      gap: 10px;
    }

    .member-group-title {
      padding-left: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 820;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .member-group-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .member-section-all .member-group-grid {
      grid-template-columns: 1fr;
    }

    .choice,
    .member-btn,
    .lang-btn,
    .nav-btn {
      min-height: 52px;
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(120, 116, 128, 0.12);
      color: var(--text);
      box-shadow: 0 8px 20px rgba(36,35,54,0.045);
      transition: transform .14s ease, background .14s ease, border-color .14s ease, box-shadow .14s ease;
      font-family: "Avenir Next", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", "Noto Sans JP", sans-serif;
    }

    .choice:active,
    .member-btn:active,
    .lang-btn:active,
    .nav-btn:active {
      transform: scale(0.985);
    }

    .choice.selected,
    .member-btn.selected,
    .lang-btn.selected {
      background: color-mix(in srgb, var(--accent) 11%, white);
      border-color: color-mix(in srgb, var(--accent) 42%, white);
    }

    .lang-btn {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas:
        "meta arrow"
        "label arrow"
        "sub arrow";
      row-gap: 8px;
      column-gap: 14px;
      align-items: center;
      text-align: left;
      min-height: 96px;
      border-radius: 24px;
      padding: 17px 18px;
      overflow: hidden;
      border-color: rgba(120, 116, 128, 0.11);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(248,248,251,0.96) 100%);
      box-shadow: 0 12px 26px rgba(36,35,54,0.042), inset 0 0 0 1px rgba(255,255,255,0.76);
    }

    .lang-btn::before {
      content: attr(data-code);
      grid-area: meta;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: start;
      min-width: 36px;
      height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(243,243,247,0.96);
      color: #8d8998;
      border: 1px solid rgba(120,116,128,0.10);
      font-size: 10px;
      font-weight: 780;
      letter-spacing: 0.16em;
    }

    .lang-btn::after {
      content: "→";
      grid-area: arrow;
      align-self: center;
      color: #8b8793;
      font-size: 18px;
      font-weight: 700;
      opacity: 0.74;
    }

    .lang-btn strong {
      grid-area: label;
      font-size: clamp(27px, 7vw, 32px);
      font-weight: 820;
      line-height: 1.02;
      letter-spacing: -0.045em;
      color: #202133;
      font-family: "SF Pro Display", "Avenir Next", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans JP", sans-serif;
    }

    .lang-btn span {
      grid-area: sub;
      color: #6f7380;
      font-size: 12px;
      line-height: 1.35;
      font-weight: 620;
      letter-spacing: 0.045em;
      text-transform: uppercase;
      opacity: 0.86;
    }

    .member-btn {
      position: relative;
      text-align: left;
      min-height: 62px;
      padding: 15px 16px 15px 18px;
      border-radius: 20px;
      border-color: color-mix(in srgb, var(--member-color, var(--accent)) 18%, white);
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--member-color, var(--accent)) 6%, white) 0%,
        rgba(255,255,255,0.94) 100%);
    }

    .member-btn.member-all {
      border-color: rgba(198, 196, 210, 0.52);
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(249,249,253,0.98) 100%);
    }

    .member-btn::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--member-color, var(--accent));
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--member-color, var(--accent)) 15%, white);
    }

    .member-btn.member-all::before {
      background: #bbb8c7;
      box-shadow: 0 0 0 6px rgba(212, 209, 224, 0.45);
    }

    .member-name {
      display: block;
      padding-left: 24px;
      font-size: 15px;
      line-height: 1.24;
      font-weight: 780;
      color: var(--ink);
      letter-spacing: -0.025em;
      font-family: "Avenir Next", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans JP", sans-serif;
    }

    #quizScreen.card {
      min-height: auto;
      padding: 18px;
    }

    .progress-area {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      background: color-mix(in srgb, var(--accent) 10%, white);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent-2) 88%, white));
      border-radius: inherit;
      transition: width .2s ease;
    }

    .progress-text {
      font-size: 12px;
      line-height: 1;
      font-weight: 820;
      color: color-mix(in srgb, var(--accent) 86%, var(--muted));
      letter-spacing: -0.02em;
      min-width: 42px;
      text-align: right;
    }

    .question {
      margin: 0 0 14px;
      padding: 18px;
      border-radius: 22px;
      background:
        linear-gradient(180deg,
          color-mix(in srgb, var(--accent) 7%, white) 0%,
          rgba(255,255,255,0.86) 100%);
      border: 1px solid color-mix(in srgb, var(--accent) 18%, white);
      font-size: clamp(19px, 5.8vw, 25px);
      line-height: 1.34;
      letter-spacing: -0.03em;
      font-weight: 720;
      text-wrap: pretty;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
      font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "SF Pro Display", "Segoe UI", "Noto Sans JP", sans-serif;
    }

    .question-sub {
      display: none;
    }

    .answer-grid {
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 0;
    }

    .choice {
      min-height: 56px;
      border-radius: 18px;
      text-align: left;
      font-size: 18px;
      line-height: 1.28;
      padding: 15px 16px;
      font-weight: 740;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .choice::after {
      content: "›";
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 20px;
      font-weight: 900;
      opacity: 0.54;
      margin-left: 12px;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    #quizScreen .nav-row {
      justify-content: flex-start;
    }

    #nextBtn { display: none; }

    .nav-btn {
      min-height: 48px;
      padding: 11px 16px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 760;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .nav-btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      border-color: transparent;
      box-shadow: 0 12px 24px color-mix(in srgb, var(--accent) 26%, transparent);
    }

    .nav-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .result-song {
      display: block;
      width: 100%;
      margin: 0 auto 18px;
      padding: 18px 16px;
      border-radius: 24px;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent) 7%, white) 0%,
        rgba(255,255,255,0.96) 100%);
      color: var(--accent);
      text-align: center;
      border: 1px solid color-mix(in srgb, var(--accent) 18%, white);
      box-shadow: 0 10px 24px rgba(36,35,54,0.055);
      overflow: hidden;
    }

    .result-title-block {
      margin: 0 0 18px;
      padding: 16px 16px 18px;
      border-radius: 22px;
      background: linear-gradient(180deg,
        color-mix(in srgb, var(--accent) 8%, white) 0%,
        rgba(255,255,255,0.98) 100%);
      border: 1px solid color-mix(in srgb, var(--accent) 16%, white);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78);
    }

    .result-state-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 10%, white);
      color: color-mix(in srgb, var(--accent) 74%, var(--muted));
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      font-family: "Avenir Next", "SF Pro Display", "Segoe UI", sans-serif;
    }

    .result-group-name {
      display: block;
      font-size: 13px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: color-mix(in srgb, var(--accent) 52%, var(--muted));
      margin-bottom: 8px;
    }

    .result-song-name {
      display: block;
      font-size: clamp(28px, 7.4vw, 38px);
      line-height: 1.03;
      letter-spacing: -0.055em;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      font-family: "Avenir Next", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans JP", sans-serif;
    }

    .result-title {
      margin: 0;
      padding: 0;
      font-size: clamp(25px, 7vw, 33px);
      line-height: 1.28;
      letter-spacing: -0.05em;
      font-weight: 860;
      color: color-mix(in srgb, var(--accent) 90%, #2a2937);
      font-family: "Avenir Next", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans JP", sans-serif;
    }

    .result-desc {
      margin-top: 6px;
      display: grid;
      gap: 16px;
      padding: 2px 2px 0;
    }

    .result-desc p {
      margin: 0;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "Noto Serif JP", "Hiragino Mincho ProN", serif;
      font-size: 18px;
      line-height: 1.92;
      letter-spacing: 0.01em;
      color: color-mix(in srgb, var(--ink) 92%, var(--accent) 8%);
      word-break: break-word;
      text-wrap: pretty;
    }

    .result-desc p.lead {
      padding: 14px 16px;
      border-radius: 18px;
      background: color-mix(in srgb, var(--accent) 8%, white);
      border: 1px solid color-mix(in srgb, var(--accent) 12%, white);
      font-size: 18px;
      line-height: 1.8;
      color: color-mix(in srgb, var(--accent) 68%, #2b2a38);
    }

    .small-note {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid color-mix(in srgb, var(--accent) 10%, rgba(120,116,128,0.18));
      font-size: 13px;
      line-height: 1.65;
      color: var(--muted);
    }

    .result-actions {
      display: grid !important;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 24px !important;
    }

    .result-actions .nav-btn {
      width: 100%;
      min-width: 0;
    }



    body:not(.member-theme):not(.white-theme) .hero-icon {
      color: #5f6978;
      background: linear-gradient(135deg, rgba(255,255,255,0.86), rgba(241,249,255,0.82));
    }

    body:not(.member-theme):not(.white-theme) .eyebrow {
      color: #687381;
    }

    body:not(.member-theme):not(.white-theme) .primary {
      background: linear-gradient(135deg, #536173 0%, #5da8df 42%, #f2b35f 76%, #80c97a 100%);
      box-shadow: 0 12px 24px rgba(83, 97, 115, 0.16);
    }
    @media (max-width: 390px) {
      .wrap {
        padding: 14px 12px 30px;
      }

      .card,
      .result-card {
        padding: 16px;
        border-radius: 24px;
      }

      .hero {
        grid-template-columns: 46px minmax(0, 1fr);
        gap: 10px;
      }

      .hero-icon {
        width: 46px;
        height: 46px;
        border-radius: 16px;
        font-size: 22px;
      }

      h1 {
        font-size: clamp(21px, 7vw, 29px);
      }

      .eyebrow {
        font-size: 10px;
      }

      #languageScreen.card {
        min-height: calc(100svh - 154px);
      }

      .hero {
        padding: 15px 16px 16px;
        border-radius: 28px;
      }

      .hero-icon {
        width: 36px;
        height: 36px;
        right: 14px;
        top: 14px;
      }

      .hero-text {
        padding-right: 48px;
      }

      h1 .title-line-top {
        font-size: 24px;
      }

      h1 .title-line-main {

          zh:"有些答案不会等你准备完美才出现。\n越是犹豫，越容易把真正想做的事拖到很远。\n\n这首歌陪你把勇气拿出来用。\n想做的事就先去做，跌倒了也没关系，往前的力气会在行动里长出来。",
          ja:"完璧に準備できるまで、答えは待ってくれないことがあります。\n迷うほど、本当にやりたいことは遠くへ延びていく。\n\nこの曲は、勇気を使わせてくれます。\nやりたいことは、まずやってみればいい。転んでも大丈夫。前へ進む力は、動く中で育っていきます。",
          en:"Some answers will not wait until you are perfectly ready.\nThe more you hesitate, the farther your real wish can drift away.\n\nThis song helps you put your courage to use.\nIf you want to do it, start first. It is okay to fall; the strength to move forward grows through action."
        }
      }

    ];

    const app = {
      lang: "zh",
      selectedMember: null,
      questionIndex: 0,
      answers: []
    };

    const languageScreen = document.getElementById("languageScreen");
    const memberScreen = document.getElementById("memberScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");

    function t(key) { return i18n[app.lang][key]; }

    function showScreen(id) {
      ["languageScreen", "memberScreen", "quizScreen", "resultScreen"].forEach(screenId => {
        const screen = document.getElementById(screenId);
        if (screen) screen.classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function formatMainTitle(text) {
      if (text === "「今」に寄り添うJUMPの一曲") {
        return `<span class="title-line title-line-top"><span class="title-bracket">「</span><span class="title-now">今</span><span class="title-bracket">」</span><span class="title-rest">に寄り添う</span></span><span class="title-line title-line-main">JUMPの一曲</span>`;
      }
      return text;
    }

    function setCopy() {
      const copy = i18n[app.lang];
      document.documentElement.lang = copy.htmlLang;
      document.getElementById("eyebrow").textContent = copy.eyebrow;
      document.getElementById("mainTitle").innerHTML = formatMainTitle(copy.mainTitle);
      document.getElementById("mainSubtitle").textContent = copy.mainSubtitle;
      document.getElementById("languageTitle").textContent = copy.languageTitle;
      document.getElementById("languageCopy").textContent = copy.languageCopy;
      document.getElementById("memberTitle").textContent = copy.memberTitle;
      document.getElementById("memberCopy").textContent = copy.memberCopy;
      document.getElementById("backBtn").textContent = copy.back;
      document.getElementById("restartBtn").textContent = copy.restart;
      document.getElementById("copyBtn").textContent = copy.copyResult;
      document.getElementById("resultStateLabel").textContent = copy.resultStateLabel;
    }

    function renderLanguages() {
      const grid = document.getElementById("languageGrid");
      grid.innerHTML = "";
      const codes = { zh: "ZH", ja: "JA", en: "EN" };
      languages.forEach((lang) => {
        const btn = document.createElement("button");
        btn.className = "lang-btn";
        btn.dataset.code = codes[lang.key] || lang.key.toUpperCase();
        btn.innerHTML = `<strong>${lang.label}</strong><span>${lang.sub}</span>`;
        btn.onclick = () => {
          app.lang = lang.key;
          setCopy();
          renderMembers();
          showScreen("memberScreen");
        };
        grid.appendChild(btn);
      });
    }

    function renderMembers() {
      const grid = document.getElementById("memberGrid");
      grid.innerHTML = "";

      const groups = [
        { key: "all", items: members.filter(member => member.role === "all") },
        { key: "current", items: members.filter(member => member.role === "current") },
        { key: "former", items: members.filter(member => member.role === "former") }
      ];

      groups.forEach(group => {
        const section = document.createElement("div");
        section.className = `member-section member-section-${group.key}`;

        const title = document.createElement("div");
        title.className = "member-group-title";
        title.textContent = t("groupLabels")[group.key];
        section.appendChild(title);

        const innerGrid = document.createElement("div");
        innerGrid.className = "member-group-grid";

        group.items.forEach(member => {
          const btn = document.createElement("button");
          btn.className = "member-btn" + (member.id === "all" ? " member-all" : "");
          const memberColor = member.id === "all"
            ? "#c6c3d1"
            : member.id === "morimoto"
              ? "#c9d1dc"
              : member.color;
          btn.style.setProperty("--member-color", memberColor);
          btn.innerHTML = `<span class="member-name">${member.name}</span>`;
          btn.onclick = () => selectMember(member.id);
          innerGrid.appendChild(btn);
        });

        section.appendChild(innerGrid);
        grid.appendChild(section);
      });
    }

    function selectMember(memberId) {
      app.selectedMember = members.find(m => m.id === memberId);
      app.answers = [];
      app.questionIndex = 0;
      applyTheme(app.selectedMember);
      renderQuestion();
      showScreen("quizScreen");
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function keepNameSpacing(value) {
      return escapeHTML(value).replace(/ /g, "&nbsp;");
    }

    function formatResultDesc(text) {
      return text
        .split(/\n\s*\n/)
        .map((paragraph, index) => `<p class="${index === 0 ? "lead" : ""}">${paragraph.replace(/\n/g, "<br>")}</p>`)
        .join("");
    }

    function applyTheme(member) {
      document.body.classList.remove("member-theme", "white-theme");
      if (!member || member.id === "all") {
        document.documentElement.style.setProperty("--accent", "#3f4758");
        document.documentElement.style.setProperty("--accent-2", "#f2a85b");
        document.documentElement.style.setProperty("--gold", "#3f4758");
        document.documentElement.style.setProperty("--accent-soft", "rgba(63, 71, 88, 0.12)");
        return;
      }
      if (member.id === "morimoto") {
        document.body.classList.add("white-theme");
        document.documentElement.style.setProperty("--accent", "#9aa3b2");
        document.documentElement.style.setProperty("--accent-2", "#ffffff");
        document.documentElement.style.setProperty("--gold", "#7b8493");
        document.documentElement.style.setProperty("--accent-soft", "rgba(154, 163, 178, 0.18)");
        return;
      }
      document.body.classList.add("member-theme");
      document.documentElement.style.setProperty("--accent", member.color);
      document.documentElement.style.setProperty("--accent-2", member.accent2 || tintColor(member.color, 42));
      document.documentElement.style.setProperty("--gold", member.color);
      document.documentElement.style.setProperty("--accent-soft", hexToRgba(member.color, 0.14));
    }

    function tintColor(hex, amount) {
      const n = parseInt(hex.replace('#',''), 16);
      let r = (n >> 16) + amount;
      let g = ((n >> 8) & 255) + amount;
      let b = (n & 255) + amount;
      r = Math.max(0, Math.min(255, r));
      g = Math.max(0, Math.min(255, g));
      b = Math.max(0, Math.min(255, b));
      return `rgb(${r},${g},${b})`;
    }

    function hexToRgba(hex, alpha) {
      const n = parseInt(hex.replace('#',''), 16);
      const r = n >> 16;
      const g = (n >> 8) & 255;
      const b = n & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function renderQuestion() {
      const q = questions[app.questionIndex];
      document.getElementById("questionText").textContent = q[app.lang];
      document.getElementById("questionSub").textContent = q.sub[app.lang];
      document.getElementById("progressText").textContent = `${app.questionIndex + 1}/${questions.length}`;
      document.getElementById("progressFill").style.width = `${((app.questionIndex + 1) / questions.length) * 100}%`;
      document.getElementById("nextBtn").textContent = app.questionIndex === questions.length - 1 ? t("seeResult") : t("next");
      document.getElementById("backBtn").disabled = false;
      document.getElementById("nextBtn").disabled = app.answers[app.questionIndex] === undefined;

      const grid = document.getElementById("answerGrid");
      grid.innerHTML = "";
      t("answers").forEach((label, index) => {
        const btn = document.createElement("button");
        btn.className = "choice" + (app.answers[app.questionIndex] === index ? " selected" : "");
        btn.textContent = label;
        btn.onclick = () => {
          app.answers[app.questionIndex] = index;
          renderQuestion();
          setTimeout(() => {
            if (app.questionIndex < questions.length - 1) {
              app.questionIndex++;
              renderQuestion();
            } else {
              showResult();
            }
          }, 170);
        };
        grid.appendChild(btn);
      });
    }

    document.getElementById("backBtn").onclick = () => {
      if (app.questionIndex > 0) {
        app.questionIndex--;
        renderQuestion();
      } else {
        document.body.classList.remove("member-theme", "white-theme");
        document.documentElement.style.setProperty("--accent", "#3f4758");
        document.documentElement.style.setProperty("--accent-2", "#f2a85b");
        document.documentElement.style.setProperty("--gold", "#3f4758");
        document.documentElement.style.setProperty("--accent-soft", "rgba(63, 71, 88, 0.12)");
        showScreen("memberScreen");
      }
    };

    document.getElementById("nextBtn").onclick = () => {
      if (app.answers[app.questionIndex] === undefined) return;
      if (app.questionIndex < questions.length - 1) {
        app.questionIndex++;
        renderQuestion();
      } else {
        showResult();
      }
    };

    document.getElementById("restartBtn").onclick = () => {
      app.selectedMember = null;
      app.questionIndex = 0;
      app.answers = [];
      document.body.classList.remove("member-theme", "white-theme");
      document.documentElement.style.setProperty("--accent", "#3f4758");
      document.documentElement.style.setProperty("--accent-2", "#f2a85b");
      document.documentElement.style.setProperty("--gold", "#3f4758");
      document.documentElement.style.setProperty("--accent-soft", "rgba(63, 71, 88, 0.12)");
      showScreen("languageScreen");
    };

    function showResult() {
      const scores = calculateDimensionScores();
      const eligible = results.filter(r => isEligible(r, app.selectedMember));
      const ranked = eligible.map(result => ({ result, score: scoreResult(result, scores) }))
        .sort((a, b) => b.score - a.score);
      const winner = ranked[0].result;
      app.lastResult = winner;
      const artistName = winner.artist || "Hey! Say! JUMP";
      document.getElementById("resultSong").innerHTML = `<span class="result-group-name">${keepNameSpacing(artistName)}</span><span class="result-song-name">${keepNameSpacing(winner.song)}</span>`;
      document.getElementById("resultTitle").textContent = winner.title[app.lang];
      document.getElementById("resultDesc").innerHTML = formatResultDesc(winner.desc[app.lang]);
      document.getElementById("resultNote").textContent = t("resultNote");
      showScreen("resultScreen");
    }


    document.getElementById("copyBtn").onclick = async () => {
      if (!app.lastResult) return;
      const winner = app.lastResult;
      const copyText = `${document.getElementById("mainTitle").textContent}
${winner.artist || "Hey! Say! JUMP"}｜${winner.song}
${winner.title[app.lang]}

${winner.desc[app.lang]}`;
      try {
        await navigator.clipboard.writeText(copyText);
      } catch (err) {
        const temp = document.createElement("textarea");
        temp.value = copyText;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
      }
      const btn = document.getElementById("copyBtn");
      const original = t("copyResult");
      btn.textContent = t("copied");
      setTimeout(() => { btn.textContent = original; }, 1200);
    };

    function calculateDimensionScores() {
      const scores = Object.fromEntries(dimensions.map(d => [d, 0]));
      Object.entries(app.selectedMember.scores).forEach(([dim, value]) => { scores[dim] += value; });
      questions.forEach((q, qi) => {
        const answerIndex = app.answers[qi];
        const multiplier = answerMultipliers[answerIndex] ?? 0;
        Object.entries(q.weights).forEach(([dim, value]) => {
          scores[dim] += value * multiplier;
        });
      });
      return scores;
    }

    function scoreResult(result, scores) {
      let total = 0;
      Object.entries(result.tags).forEach(([dim, weight]) => {
        total += (scores[dim] || 0) * weight;
      });
      if (result.memberBoost && app.selectedMember && result.memberBoost[app.selectedMember.id]) {
        total += result.memberBoost[app.selectedMember.id];
      }
      total += Math.random() * 0.0001;
      return total;
    }

    function isEligible(result, member) {
      const limit = eras[member.maxEra];
      if (result.era > limit) return false;
      if (result.memberOnly && !result.memberOnly.includes(member.id)) return false;
      return true;
    }

    setCopy();
    renderLanguages();
  </script>
</body>
</html>
