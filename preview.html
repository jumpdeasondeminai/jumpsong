<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>“今”に寄り添うJUMPの一曲</title>
  <style>
    :root {
      --accent: #7a747d;
      --accent-2: #b6b0b8;
      --accent-soft: rgba(122, 116, 125, 0.12);
      --ink: #232236;
      --gold: var(--accent);
      --paper: #fffdfd;
      --paper-2: #f8f4ff;
      --bg: linear-gradient(135deg,
        rgba(233,66,74,0.16) 0%,
        rgba(245,163,191,0.14) 16%,
        rgba(242,140,40,0.14) 31%,
        rgba(139,92,246,0.14) 47%,
        rgba(107,183,255,0.11) 62%,
        rgba(244,208,63,0.16) 78%,
        rgba(124,207,122,0.15) 100%);
      --card: rgba(255,255,255,0.88);
      --text: #232236;
      --muted: #69697b;
      --line: rgba(132, 126, 136, 0.28);
      --shadow: 0 24px 70px rgba(40, 40, 90, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      transition: background 0.6s ease;
    }

    body.member-theme {
      background:
        radial-gradient(circle at 18% 8%, rgba(255,255,255,0.92) 0 16%, transparent 42%),
        radial-gradient(circle at 88% 10%, color-mix(in srgb, var(--accent) 34%, transparent) 0 18%, transparent 42%),
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 18%, white) 0%, #ffffff 48%, color-mix(in srgb, var(--accent-2) 22%, white) 100%);
    }

    body.white-theme {
      background:
        radial-gradient(circle at 18% 8%, rgba(255,255,255,0.96) 0 16%, transparent 42%),
        radial-gradient(circle at 88% 10%, rgba(210,216,230,0.48) 0 18%, transparent 42%),
        linear-gradient(135deg, #ffffff 0%, #f8f8fb 48%, #eef1f7 100%);
    }

    .wrap {
      width: min(1040px, calc(100% - 36px));
      margin: 0 auto;
      padding: clamp(28px, 5vw, 56px) 0 72px;
    }

    .hero {
      position: relative;
      text-align: left;
      padding: 0 0 clamp(28px, 5vw, 48px);
      display: grid;
      grid-template-columns: 92px 1fr;
      column-gap: 26px;
      align-items: center;
    }

    .hero::before {
      content: "♪";
      grid-row: 1 / span 3;
      width: 92px;
      height: 92px;
      border-radius: 28px;
      display: grid;
      place-items: center;
      background: var(--ink);
      color: var(--accent);
      font-size: 42px;
      box-shadow: 0 20px 44px rgba(34,29,24,0.14);
    }

    .eyebrow {
      display: block;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      color: var(--accent);
      font-size: clamp(14px, 2.3vw, 24px);
      font-weight: 900;
      letter-spacing: 0.36em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 0;
      font-size: clamp(42px, 7vw, 76px);
      line-height: 1.02;
      letter-spacing: -0.06em;
      font-weight: 900;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 680px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .subtitle:empty,
    .section-title:empty,
    .section-copy:empty {
      display: none;
    }

    .card {
      margin: clamp(22px, 4vw, 42px) auto;
      padding: clamp(34px, 6vw, 72px);
      border-radius: 46px;
      background: var(--card);
      backdrop-filter: blur(18px);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
    }

    #quizScreen.card,
    #resultScreen .result-card {
      border-radius: 48px;
      background: rgba(255,255,255,0.88);
      border: 2px solid var(--line);
    }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeUp .38s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .language-grid, .answer-grid {
      display: grid;
      gap: 12px;
    }

    .language-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .member-grid { display: flex; flex-direction: column; gap: 26px; }
    .member-section { display: flex; flex-direction: column; gap: 12px; }
    .member-group-title {
      font-size: 15px;
      font-weight: 900;
      color: var(--muted);
      letter-spacing: 0.08em;
      padding-left: 4px;
    }
    .member-group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }
    .member-section-all .member-group-grid {
      grid-template-columns: minmax(220px, 1fr);
    }
    .answer-grid {
      grid-template-columns: 1fr;
      margin-top: clamp(30px, 5vw, 52px);
      gap: 18px;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .choice, .member-btn, .lang-btn, .nav-btn {
      border-radius: 999px;
      padding: 20px 28px;
      background: rgba(255,255,255,0.9);
      border: 2px solid color-mix(in srgb, var(--accent) 46%, white);
      color: var(--text);
      box-shadow: 0 12px 30px rgba(40,40,90,0.08);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      font-weight: 900;
    }

    .choice:hover, .member-btn:hover, .lang-btn:hover, .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(40,40,90,0.14);
      background: #fffef8;
    }

    .choice.selected, .member-btn.selected, .lang-btn.selected {
      outline: 0;
      background: color-mix(in srgb, var(--accent) 26%, white);
      border-color: var(--accent);
    }

    .choice {
      min-height: 82px;
      text-align: left;
      font-size: clamp(19px, 2.4vw, 28px);
      padding-left: clamp(26px, 5vw, 58px);
    }

    .section-title {
      margin: 0 0 18px;
      font-size: clamp(22px, 4vw, 34px);
      letter-spacing: -0.03em;
    }

    .section-copy {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.75;
    }

    .member-btn {
      text-align: left;
      min-height: 74px;
      position: relative;
      overflow: hidden;
    }

    .member-name { font-weight: 800; display: block; }
    .member-role { display: none; }

    .progress-area {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 18px;
      margin-bottom: clamp(36px, 6vw, 70px);
    }

    .progress-track {
      height: 20px;
      flex: 1;
      background: color-mix(in srgb, var(--accent) 18%, white);
      border-radius: 999px;
      overflow: hidden;
      border: 0;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--ink);
      border-radius: 999px;
      transition: width .28s ease;
    }

    .progress-text {
      min-width: 118px;
      text-align: right;
      color: var(--accent);
      font-size: clamp(18px, 2.3vw, 28px);
      font-weight: 900;
    }

    .question {
      font-size: clamp(34px, 5.8vw, 60px);
      line-height: 1.18;
      letter-spacing: -0.06em;
      font-weight: 900;
      margin: 0 0 8px;
    }

    .question-sub {
      display: none;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
    }

    .nav-btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 800;
    }

    .nav-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    .result-card {
      text-align: center;
      padding: clamp(34px, 6vw, 76px);
      border-radius: 48px;
      background: rgba(255,255,255,0.88);
      border: 2px solid var(--line);
      box-shadow: var(--shadow);
    }

    .result-song {
      display: block;
      max-width: 880px;
      margin: 0 auto clamp(28px, 5vw, 48px);
      padding: clamp(26px, 5vw, 48px);
      border-radius: 34px;
      background:
        radial-gradient(circle at 18% 10%, color-mix(in srgb, var(--accent) 18%, transparent) 0 22%, transparent 48%),
        rgba(255,255,255,0.72);
      color: var(--accent);
      font-weight: 900;
      line-height: 1.05;
      word-break: keep-all;
      text-align: center;
      border: 2px solid color-mix(in srgb, var(--accent) 32%, white);
      box-shadow: 0 18px 46px rgba(40,40,90,0.10);
    }

    .result-group-name {
      display: block;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: clamp(14px, 1.8vw, 20px);
      font-weight: 900;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .result-song-name {
      display: block;
      color: var(--accent);
      font-size: clamp(50px, 7.2vw, 90px);
      letter-spacing: -0.06em;
    }

    .result-title {
      display: inline-block;
      margin: 0 auto clamp(26px, 4vw, 44px);
      padding: 16px 28px;
      border-radius: 999px;
      background: var(--accent);
      font-size: clamp(22px, 4.2vw, 36px);
      line-height: 1.18;
      letter-spacing: -0.04em;
      color: var(--ink);
      font-weight: 900;
    }

    .result-desc {
      white-space: pre-line;
      margin: 0 auto;
      max-width: 760px;
      font-size: clamp(22px, 3.4vw, 42px);
      line-height: 1.82;
      color: #5a503c;
      text-align: left;
      letter-spacing: -0.03em;
    }

    .small-note {
      margin-top: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
    }

    .result-card .small-note {
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
    }


    #nextBtn {
      display: none;
    }

    #quizScreen .nav-row {
      justify-content: flex-start;
    }

    .result-actions {
      flex-wrap: wrap;
    }

    @media (max-width: 720px) {
      .language-grid, .answer-grid, .member-group-grid, .member-section-all .member-group-grid { grid-template-columns: 1fr; }
      .wrap { width: min(100% - 22px, 980px); padding-top: 18px; }
      .hero { padding-top: 24px; }
      .card { border-radius: 24px; }
      .nav-row { flex-direction: column; }
      .nav-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="eyebrow" id="eyebrow">Hey! Say!JUMPSong Test</div>
      <h1 id="mainTitle">“今”に寄り添うJUMPの一曲</h1>
      <p class="subtitle" id="mainSubtitle">Choose a language first, then answer the questions to find theJUMPsong that fits your current mood.</p>
    </header>

    <main>
      <section id="languageScreen" class="screen active card">
        <h2 class="section-title" id="languageTitle">Select Language</h2>
        <p class="section-copy" id="languageCopy">请选择测试语言。后续题目和结果文案会按语言显示。</p>
        <div class="language-grid" id="languageGrid"></div>
      </section>

      <section id="memberScreen" class="screen card">
        <h2 class="section-title" id="memberTitle"></h2>
        <p class="section-copy" id="memberCopy"></p>
        <div class="member-grid" id="memberGrid"></div>
      </section>

      <section id="quizScreen" class="screen card">
        <div class="progress-area">
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText"></div>
        </div>
        <div class="question" id="questionText"></div>
        <div class="question-sub" id="questionSub"></div>
        <div class="answer-grid" id="answerGrid"></div>
        <div class="nav-row">
          <button class="nav-btn" id="backBtn"></button>
          <button class="nav-btn primary" id="nextBtn" disabled></button>
        </div>
      </section>

      <section id="resultScreen" class="screen">
        <div class="result-card">
          <div class="result-song" id="resultSong"></div>
          <h2 class="result-title" id="resultTitle"></h2>
          <p class="result-desc" id="resultDesc"></p>
          <div class="small-note" id="resultNote"></div>
          <div class="nav-row result-actions" style="justify-content:center; margin-top:30px;">
            <button class="nav-btn primary" id="restartBtn"></button>
            <button class="nav-btn" id="copyBtn"></button>
          </div>
        </div>
      </section>
    </main>
  </div>

    const app = {
      lang: "zh",
      selectedMember: null,
      questionIndex: 0,
      answers: []
    };

    const languageScreen = document.getElementById("languageScreen");
    const memberScreen = document.getElementById("memberScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");

    function t(key) { return i18n[app.lang][key]; }

    function showScreen(id) {
      [languageScreen, memberScreen, quizScreen, resultScreen].forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setCopy() {
      const copy = i18n[app.lang];
      document.documentElement.lang = copy.htmlLang;
      document.getElementById("eyebrow").textContent = copy.eyebrow;
      document.getElementById("mainTitle").textContent = copy.mainTitle;
      document.getElementById("mainSubtitle").textContent = copy.mainSubtitle;
      document.getElementById("languageTitle").textContent = copy.languageTitle;
      document.getElementById("languageCopy").textContent = copy.languageCopy;
      document.getElementById("memberTitle").textContent = copy.memberTitle;
      document.getElementById("memberCopy").textContent = copy.memberCopy;
      document.getElementById("backBtn").textContent = copy.back;
      document.getElementById("restartBtn").textContent = copy.restart;
      document.getElementById("copyBtn").textContent = copy.copyResult;
    }

    function renderLanguages() {
      const grid = document.getElementById("languageGrid");
      grid.innerHTML = "";
      languages.forEach(lang => {
        const btn = document.createElement("button");
        btn.className = "lang-btn";
        btn.innerHTML = `<strong>${lang.label}</strong><br><span style="color:var(--muted);font-size:13px;">${lang.sub}</span>`;
        btn.onclick = () => {
          app.lang = lang.key;
          setCopy();
          renderMembers();
          showScreen("memberScreen");
        };
        grid.appendChild(btn);
      });
    }

    function renderMembers() {
      const grid = document.getElementById("memberGrid");
      grid.innerHTML = "";

      const groups = [
        { key: "all", items: members.filter(member => member.role === "all") },
        { key: "current", items: members.filter(member => member.role === "current") },
        { key: "former", items: members.filter(member => member.role === "former") }
      ];

      groups.forEach(group => {
        const section = document.createElement("div");
        section.className = `member-section member-section-${group.key}`;

        const title = document.createElement("div");
        title.className = "member-group-title";
        title.textContent = t("groupLabels")[group.key];
        section.appendChild(title);

        const innerGrid = document.createElement("div");
        innerGrid.className = "member-group-grid";

        group.items.forEach(member => {
          const btn = document.createElement("button");
          btn.className = "member-btn";
          btn.innerHTML = `<span class="member-name">${member.name}</span>`;
          btn.onclick = () => selectMember(member.id);
          innerGrid.appendChild(btn);
        });

        section.appendChild(innerGrid);
        grid.appendChild(section);
      });
    }

    function selectMember(memberId) {
      app.selectedMember = members.find(m => m.id === memberId);
      app.answers = [];
      app.questionIndex = 0;
      applyTheme(app.selectedMember);
      renderQuestion();
      showScreen("quizScreen");
    }

    function applyTheme(member) {
      document.body.classList.remove("member-theme", "white-theme");
      if (!member || member.id === "all") {
        document.documentElement.style.setProperty("--accent", "#7a747d");
        document.documentElement.style.setProperty("--accent-2", "#b6b0b8");
        document.documentElement.style.setProperty("--gold", "#7a747d");
        document.documentElement.style.setProperty("--accent-soft", "rgba(122, 116, 125, 0.12)");
        return;
      }
      if (member.id === "morimoto") {
        document.body.classList.add("white-theme");
        document.documentElement.style.setProperty("--accent", "#9aa3b2");
        document.documentElement.style.setProperty("--accent-2", "#ffffff");
        document.documentElement.style.setProperty("--gold", "#7b8493");
        document.documentElement.style.setProperty("--accent-soft", "rgba(154, 163, 178, 0.18)");
        return;
      }
      document.body.classList.add("member-theme");
      document.documentElement.style.setProperty("--accent", member.color);
      document.documentElement.style.setProperty("--accent-2", tintColor(member.color, 58));
      document.documentElement.style.setProperty("--gold", member.color);
      document.documentElement.style.setProperty("--accent-soft", hexToRgba(member.color, 0.16));
    }

    function tintColor(hex, amount) {
      const n = parseInt(hex.replace('#',''), 16);
      let r = (n >> 16) + amount;
      let g = ((n >> 8) & 255) + amount;
      let b = (n & 255) + amount;
      r = Math.max(0, Math.min(255, r));
      g = Math.max(0, Math.min(255, g));
      b = Math.max(0, Math.min(255, b));
      return `rgb(${r},${g},${b})`;
    }

    function hexToRgba(hex, alpha) {
      const n = parseInt(hex.replace('#',''), 16);
      const r = n >> 16;
      const g = (n >> 8) & 255;
      const b = n & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function renderQuestion() {
      const q = questions[app.questionIndex];
      document.getElementById("questionText").textContent = q[app.lang];
      document.getElementById("questionSub").textContent = q.sub[app.lang];
      document.getElementById("progressText").textContent = `${app.questionIndex + 1}/${questions.length}`;
      document.getElementById("progressFill").style.width = `${((app.questionIndex + 1) / questions.length) * 100}%`;
      document.getElementById("nextBtn").textContent = app.questionIndex === questions.length - 1 ? t("seeResult") : t("next");
      document.getElementById("backBtn").disabled = false;
      document.getElementById("nextBtn").disabled = app.answers[app.questionIndex] === undefined;

      const grid = document.getElementById("answerGrid");
      grid.innerHTML = "";
      t("answers").forEach((label, index) => {
        const btn = document.createElement("button");
        btn.className = "choice" + (app.answers[app.questionIndex] === index ? " selected" : "");
        btn.textContent = label;
        btn.onclick = () => {
          app.answers[app.questionIndex] = index;
          renderQuestion();
          setTimeout(() => {
            if (app.questionIndex < questions.length - 1) {
              app.questionIndex++;
              renderQuestion();
            } else {
              showResult();
            }
          }, 170);
        };
        grid.appendChild(btn);
      });
    }

    document.getElementById("backBtn").onclick = () => {
      if (app.questionIndex > 0) {
        app.questionIndex--;
        renderQuestion();
      } else {
        document.body.classList.remove("member-theme", "white-theme");
        document.documentElement.style.setProperty("--accent", "#7a747d");
        document.documentElement.style.setProperty("--accent-2", "#b6b0b8");
        document.documentElement.style.setProperty("--gold", "#7a747d");
        document.documentElement.style.setProperty("--accent-soft", "rgba(122, 116, 125, 0.12)");
        showScreen("memberScreen");
      }
    };

    document.getElementById("nextBtn").onclick = () => {
      if (app.answers[app.questionIndex] === undefined) return;
      if (app.questionIndex < questions.length - 1) {
        app.questionIndex++;
        renderQuestion();
      } else {
        showResult();
      }
    };

    document.getElementById("restartBtn").onclick = () => {
      app.selectedMember = null;
      app.questionIndex = 0;
      app.answers = [];
      document.body.classList.remove("member-theme", "white-theme");
      document.documentElement.style.setProperty("--accent", "#7a747d");
      document.documentElement.style.setProperty("--accent-2", "#b6b0b8");
      document.documentElement.style.setProperty("--gold", "#7a747d");
      document.documentElement.style.setProperty("--accent-soft", "rgba(122, 116, 125, 0.12)");
      showScreen("languageScreen");
    };

    function showResult() {
      const scores = calculateDimensionScores();
      const eligible = results.filter(r => isEligible(r, app.selectedMember));
      const ranked = eligible.map(result => ({ result, score: scoreResult(result, scores) }))
        .sort((a, b) => b.score - a.score);
      const winner = ranked[0].result;
      app.lastResult = winner;
      document.getElementById("resultSong").innerHTML = `<span class="result-group-name">Hey! Say!JUMP</span><span class="result-song-name">${winner.song}</span>`;
      document.getElementById("resultTitle").textContent = winner.title[app.lang];
      document.getElementById("resultDesc").textContent = winner.desc[app.lang];
      document.getElementById("resultNote").textContent = t("resultNote");
      showScreen("resultScreen");
    }


    document.getElementById("copyBtn").onclick = async () => {
      if (!app.lastResult) return;
      const winner = app.lastResult;
      const copyText = `${document.getElementById("mainTitle").textContent}
Hey! Say!JUMP｜${winner.song}
${winner.title[app.lang]}

${winner.desc[app.lang]}`;
      try {
        await navigator.clipboard.writeText(copyText);
      } catch (err) {
        const temp = document.createElement("textarea");
        temp.value = copyText;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
      }
      const btn = document.getElementById("copyBtn");
      const original = t("copyResult");
      btn.textContent = t("copied");
      setTimeout(() => { btn.textContent = original; }, 1200);
    };

    function calculateDimensionScores() {
      const scores = Object.fromEntries(dimensions.map(d => [d, 0]));
      Object.entries(app.selectedMember.scores).forEach(([dim, value]) => { scores[dim] += value; });
      questions.forEach((q, qi) => {
        const answerIndex = app.answers[qi];
        const multiplier = answerMultipliers[answerIndex] ?? 0;
        Object.entries(q.weights).forEach(([dim, value]) => {
          scores[dim] += value * multiplier;
        });
      });
      return scores;
    }

    function scoreResult(result, scores) {
      let total = 0;
      Object.entries(result.tags).forEach(([dim, weight]) => {
        total += (scores[dim] || 0) * weight;
      });
      total += Math.random() * 0.0001;
      return total;
    }

    function isEligible(result, member) {
      const limit = eras[member.maxEra];
      return result.era <= limit;
    }

    setCopy();
    renderLanguages();
  </script>
</body>
</html>
